    <title>Wolf Studios Produções</title>
    <style>
        :root {
            --prata: #b0b0b0;
            --preto-fundo: #0a0a0a;
            --preto-card: #1a1a1a;
            --borda: #404040;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--preto-fundo); 
            color: #e0e0e0; 
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .wolf-logo {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            object-fit: contain;
        }

        h1 { 
            color: var(--prata); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin: 0;
            font-weight: 300;
            font-size: 1.8rem;
        }

        .reflexo-linha {
            width: 300px;
            height: 1px;
            margin: 40px auto 50px auto;
            background: linear-gradient(to right, transparent, white, transparent);
            opacity: 0.5;
        }

        h2 { 
            color: var(--prata); 
            border-bottom: 2px solid var(--borda); 
            display: inline-block; 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .container { max-width: 900px; margin: auto; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin-bottom: 50px;
        }

        .card { 
            background: var(--preto-card); 
            padding: 25px; 
            border-radius: 10px; 
            border: 1px solid var(--borda);
            transition: border 0.3s;
        }

        .card:hover { border-color: var(--prata); }

        .btn { 
            display: inline-block; 
            padding: 12px 25px; 
            background: transparent; 
            color: var(--prata); 
            text-decoration: none; 
            border: 1px solid var(--prata);
            border-radius: 5px; 
            margin-top: 15px; 
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: var(--prata); color: #000; }

        footer {
            margin-top: 60px;
            padding-bottom: 30px;
            color: #404040;
            font-size: 0.8rem;
        }
    </style>
</head>
