<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wolf Studios Produções | Portal de Conteúdo</title>
    <style>
        :root { --cor-primaria: #b8860b; --fundo: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Roboto', sans-serif; background: var(--fundo); color: #fff; margin: 0; }
        
        /* Cabeçalho Estilo Portal */
        header { background: #000; padding: 15px; border-bottom: 3px solid var(--cor-primaria); display: flex; align-items: center; justify-content: space-between; }
        .logo { height: 60px; }
        
        /* Menu de Categorias */
        nav { background: #222; padding: 10px; display: flex; justify-content: center; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; padding: 5px 15px; border-radius: 4px; }
        nav a:hover { background: var(--cor-primaria); }

        /* Grade de Conteúdo (Estilo Rede Canais) */
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 5px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: scale(1.03); border: 1px solid var(--cor-primaria); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card h3 { padding: 10px; font-size: 1em; text-align: center; }

        /* Player Embed */
        .player-area { max-width: 900px; margin: 20px auto; background: #000; padding: 10px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" class="logo" alt="Wolf Studios">
        <input type="text" placeholder="Buscar conteúdo...">
    </header>

    <nav>
        <a href="#">Início</a>
        <a href="#">Filmes</a>
        <a href="#">Fanfilms</a>
        <a href="#">HQs</a>
    </nav>

    <main class="catalogo">
        <div class="card">
            <img src="capa_filme.jpg" alt="Capa">
            <h3>Nome do Filme</h3>
        </div>
        <div class="card">
            <img src="capa_hq.jpg" alt="Capa HQ">
            <h3>Nome da HQ</h3>
        </div>
    </main>

</body>
</html>
