<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wolf Studios Produções</title>
    <style>
        :root {
            --prata: #b0b0b0;
            --preto-fundo: #0a0a0a;
            --preto-card: #1a1a1a;
            --borda: #404040;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--preto-fundo); 
            color: #e0e0e0; 
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 { 
            color: var(--prata); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-top: 40px; 
            margin-bottom: 50px;
            font-weight: 300;
        }

        h2 { 
            color: var(--prata); 
            border-bottom: 2px solid var(--borda); 
            display: inline-block; 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .container { max-width: 900px; margin: auto; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin-bottom: 50px;
        }

        .card { 
            background: var(--preto-card); 
            padding: 25px; 
            border-radius: 10px; 
            border: 1px solid var(--borda);
            transition: border 0.3s;
        }

        .card:hover { border-color: var(--prata); }

        .btn { 
            display: inline-block; 
            padding: 12px 25px; 
            background: transparent; 
            color: var(--prata); 
            text-decoration: none; 
            border: 1px solid var(--prata);
            border-radius: 5px; 
            margin-top: 15px; 
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: var(--prata); color: #000; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wolf Studios Produções</h1>

        <!-- Setor Fanfilms -->
        <section id="fanfilms">
            <h2>Fanfilms</h2>
            <div class="grid">
                <div class="card">
                    <h3>Doctor Who Project</h3>
                    <iframe width="100%" height="200" src="https://www.youtube.com/embed/_db3SqSzCcY" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <!-- Setor HQs -->
        <section id="hqs">
            <h2>HQs</h2>
            <div class="grid">
                <div class="card">
                    <h3>Fenix</h3>
                    <p>Projeto original de quadrinhos</p>
                    <a href="https://drive.google.com/drive/folders/seu-link-aqui" class="btn" target="_blank">Acessar Pasta de HQs</a>
                </div>
            </div>
        </section>

        <!-- Setor Fanfics -->
        <section id="fanfics">
            <h2>Fanfics</h2>
            <div class="grid">
                <!-- Fanfic 1 -->
                <div class="card">
                    <h3>A Extinção do Tempo</h3>
                    <p>Skorma: Ira do Senhor do Tempo</p>
                    <a href="https://drive.google.com/file/d/1MNOY87hM2jTRGI96DqBpuooe-hhmuwOz/view?usp=drive_link" class="btn" target="_blank">Ler HQ</a>
                </div>
                
                <!-- Nova Fanfic Adicionada -->
                <div class="card">
                    <h3>Nova Fanfic</h3>
                    <p>Conteúdo adicional adicionado ao site</p>
                    <a href="https://drive.google.com/file/d/1DLtLS1P6fnBLIWJNsr2Ss1AjhHxC_AHa/view?usp=drive_link" class="btn" target="_blank">Ler Fanfic</a>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
