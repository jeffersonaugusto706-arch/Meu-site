<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wolf Studios Produções</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-900 text-white p-10">

    <h1 class="text-3xl font-bold mb-8">Wolf Studios Produções</h1>

    <!-- Grade de Conteúdo -->
    <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    <!-- Modal (Onde abre o vídeo ou a HQ) -->
    <div id="modal" class="modal fixed inset-0 bg-black bg-opacity-90 items-center justify-center p-4">
        <div class="relative w-full h-[90vh] max-w-[1000px]">
            <button onclick="fecharModal()" class="absolute -top-10 right-0 text-white font-bold">FECHAR (X)</button>
            <div id="modal-content" class="w-full h-full"></div>
        </div>
    </div>

    <script>
        const biblioteca = [
            { tipo: 'video', id: 'lFqCWO2hfYc', titulo: 'Doctor Who: The Death Trainer' },
            { 
                tipo: 'hq', 
                id: 'https://docs.google.com/viewer?url=https://drive.google.com/uc?export=view&id=1MNOY87hM2jTRGI96DqBpuooe-hhmuwOz&embedded=true', 
                titulo: 'Doctor Who: Extinção Skorm' 
            }
        ];

        function renderizar() {
            const grid = document.getElementById('grid');
            biblioteca.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-4 rounded cursor-pointer hover:bg-gray-700";
                card.innerHTML = `<h2 class="text-xl">${item.titulo}</h2><p class="text-sm text-gray-400">${item.tipo.toUpperCase()}</p>`;
                card.onclick = () => abrirMidia(item);
                grid.appendChild(card);
            });
        }

        function abrirMidia(item) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('active');
            
            if(item.tipo === 'video') {
                content.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${item.id}" allowfullscreen></iframe>`;
            } else {
                content.innerHTML = `<iframe class="w-full h-full" src="${item.id}" frameborder="0"></iframe>`;
            }
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modal-content').innerHTML = '';
        }

        renderizar();
    </script>
</body>
</html>
