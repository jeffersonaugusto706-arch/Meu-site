<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Wolf Studios Produções | Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #141414; color: white; font-family: sans-serif; }
        .logo-text { color: #a3e635; font-weight: 800; letter-spacing: 2px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #202020; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .card:hover { transform: scale(1.03); border-color: #a3e635; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <header class="p-8 border-b border-zinc-800">
        <h1 class="text-4xl logo-text">WOLF STUDIOS PRODUÇÕES</h1>
    </header>

    <main class="grid-container" id="content-grid"></main>

    <div id="modal" class="modal" onclick="fecharMidia()">
        <div class="w-11/12 max-w-4xl" onclick="event.stopPropagation()">
            <div id="modal-content" class="aspect-video bg-black flex items-center justify-center rounded-lg"></div>
        </div>
    </div>

    <script>
    // --- BASE DE DADOS ---
const biblioteca = [
    { tipo: 'video', id: 'lFqCWO2hfYc', titulo: 'Doctor Who: The Death Trainer' },
    { tipo: 'hq', id: 'URL_DA_SUA_HQ', titulo: 'HQ: Edição #01' }
];{ 
    tipo: 'hq', 
    id: 'https://docs.google.com/viewer?url=https://drive.google.com/uc?export=view&id=1MNOY87hM2jTRGI96DqBpuooe-hhmuwOz&embedded=true', 
    titulo: 'Doctor Who: Extinção Skorm' 
}

        const grid = document.getElementById('content-grid');

        // --- RENDERIZAÇÃO ---
        biblioteca.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.tipo === 'video' ? 'https://img.youtube.com/vi/'+item.id+'/hqdefault.jpg' : 'https://via.placeholder.com/300x170?text=HQ+Wolf+Studios'}" class="w-full">
                <div class="p-4">
                    <h3 class="font-bold">${item.titulo}</h3>
                    <span class="text-xs text-lime-400">${item.tipo.toUpperCase()}</span>
                </div>
            `;
            card.onclick = () => abrirMidia(item);
            grid.appendChild(card);
        });

        // --- LÓGICA DE MÍDIA ---
        function abrirMidia(item) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            
            if(item.tipo === 'video') {
                content.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${item.id}?autoplay=1" allowfullscreen></iframe>`;
            } else {
                content.innerHTML = `<iframe class="w-full h-full" src="${item.id}"></iframe>`;
            }
            modal.classList.add('active');
        }

        function fecharMidia() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modal-content').innerHTML = '';
        }
    </script>
</body>
</html>
