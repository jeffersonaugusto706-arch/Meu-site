<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wolf Studios Produções</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Aplica a imagem como fundo do site inteiro */
            background-image: url('A Mascara da vingança._15.jpg');
            background-size: cover; /* Faz a imagem cobrir todo o espaço */
            background-position: center; /* Centraliza a imagem */
            background-repeat: no-repeat;
            background-attachment: fixed; /* Mantém a imagem fixa ao rolar a página */
            color: #e0e0e0; 
            padding: 20px; 
            text-align: center; 
            min-height: 100vh;
            margin: 0;
        }

        /* Criamos uma camada escura semi-transparente para o texto ficar legível sobre a imagem */
        .overlay {
            background-color: rgba(0, 0, 0, 0.7); /* 70% opacidade preta */
            padding: 40px;
            border-radius: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 { color: #ffffff; }
        h2 { color: #c0c0c0; border-bottom: 1px solid #555; display: inline-block; padding-bottom: 5px; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            margin-top: 30px; 
        }
        
        .card { 
            background: rgba(26, 26, 26, 0.8); /* Fundo levemente transparente */
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #404040; 
        }
        
        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background: #2a2a2a; 
            color: #ffffff; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-top: 15px; 
            font-weight: bold; 
            border: 1px solid #8c8c8c; 
            transition: 0.3s; 
        }
        .btn:hover { background: #404040; border-color: #ffffff; }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Wolf Studios Produções</h1>

        <section id="fanfics">
            <h2>Fanfics</h2>
            <div class="grid-container">
                <div class="card">
                    <h3>Doctor Who: A Extinção do Tempo</h3>
                    <p>Skorma: Ira do Senhor do Tempo</p>
                    <a href="https://drive.google.com/file/d/1MNOY87hM2jTRGI96DqBpuooe-hhmuwOz/view?usp=drive_link" class="btn" target="_blank" rel="noopener noreferrer">
                        📖 Ler HQ Completa
                    </a>
                </div>
            </div>
        </section>

        <section id="fanfilms" style="margin-top: 50px;">
            <h2>Fanfilms</h2>
            <div class="grid-container">
                <div class="card">
                    <iframe width="100%" height="315" src="https://www.youtube.com/embed/_db3SqSzCcY" frameborder="0" allowfullscreen></iframe>
                    <p>Doctor Who - Fanfilm Project</p>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
