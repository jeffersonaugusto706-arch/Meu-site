<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Studios Produções</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --red-wolf: #cc1a1a;
            --bg: #0a0a0a;
            --bg-card: #111111;
            --border: rgba(255,255,255,0.07);
            --text-muted: #888;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #e5e5e5; }
        .logo-text span { color: var(--red-wolf); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-black/95 border-b border-white/10 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="logo-text text-2xl font-bold tracking-widest">WOLF<span>STUDIOS</span></div>
            <nav class="flex gap-6">
                <a href="#" class="text-xs uppercase font-bold text-gray-400 hover:text-white border-b-2 border-red-600">Home</a>
                <a href="#" class="text-xs uppercase font-bold text-gray-400 hover:text-white">Portfólio</a>
                <a href="#" class="text-xs uppercase font-bold text-gray-400 hover:text-white">Contato</a>
            </nav>
        </div>
    </header>

    <main id="content-area" class="max-w-6xl mx-auto py-12 px-6">
        <section class="hero text-center py-20">
            <h1 class="text-6xl md:text-8xl font-black uppercase text-white mb-6">Wolf Studios</h1>
            <p class="text-gray-400 max-w-lg mx-auto">Produção audiovisual de alto impacto para marcas e criadores.</p>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-[#111] border border-white/10 rounded overflow-hidden">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                </div>
                <div class="p-4">
                    <p class="text-[10px] font-bold text-red-600 uppercase">Comercial</p>
                    <h3 class="text-sm font-semibold text-white">Título do Projeto 01</h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/10 py-6 text-center text-xs text-gray-500">
        &copy; 2026 Wolf Studios Produções. Todos os direitos reservados.
    </footer>

</body>
</html>
