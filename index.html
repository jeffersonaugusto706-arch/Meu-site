<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b132b; color: white; padding: 20px; text-align: center; }
        .logo-container { margin-bottom: 20px; }
        .logo-container img { width: 250px; border-radius: 15px; border: 2px solid #48cae4; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .card { background: #1c2541; padding: 20px; border-radius: 15px; border: 1px solid #48cae4; }
        /* Ajuste para visualizar o PDF direto no site */
        .pdf-viewer { width: 100%; height: 400px; border: none; margin-top: 15px; background: white; }
        .btn { display: inline-block; padding: 12px 25px; background: #0077b6; color: white; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- Substitua 'A Mascara da vingança._15.jpg' pelo caminho real da imagem no seu servidor -->
        <img src="A Mascara da vingança._15.jpg" alt="Logo Wolf Studios Produções">
        <h1>Wolf Studios Produções</h1>
    </div>

    <section id="hqs">
        <h2>HQs e Fanfics</h2>
        <div class="grid-container">
            <div class="card">
                <h3>Doctor Who: A Extinção do Tempo</h3>
                <!-- Visualizador de PDF -->
                <embed src="doctor-who-extincao-do-tempo.pdf" class="pdf-viewer">
                <br>
                <a href="doctor-who-extincao-do-tempo.pdf" class="btn" download>📥 Baixar PDF Completo</a>
            </div>
        </div>
    </section>

    <section id="videos" style="margin-top: 50px;">
        <h2>Nossos Vídeos</h2>
        <iframe width="100%" height="450" src="https://www.youtube.com/embed/_db3SqSzCcY" frameborder="0" allowfullscreen></iframe>
    </section>

</body>
</html>
